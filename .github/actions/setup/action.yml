name: Setup
description: Set up Node and install dependencies (node_modules cached on package-lock.json).

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: npm

    - name: Cache node_modules
      id: node-modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci
