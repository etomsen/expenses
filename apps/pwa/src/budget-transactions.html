<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tomsy — Budget transactions</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tomsy" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/icon-512.png" />
    <!-- pico.css and Alpine.js served locally from assets, not a CDN -->
    <link rel="stylesheet" href="assets/pico.min.css" />
    <!-- Phone layout: tighten the transactions table like the blotter. -->
    <style>
      @media (max-width: 540px) {
        main.container {
          padding-left: 0.5rem;
          padding-right: 0.5rem;
        }
        main table th,
        main table td {
          padding: 0.3rem 0.35rem;
          font-size: 0.8rem;
        }
        main table th[scope='row'],
        main table td:nth-child(2) {
          white-space: nowrap;
        }
      }
    </style>
    <!-- Shared readiness-promise script (inlined at build by the templater). -->
    <template x-src="db-ready.js"></template>
    <!-- Local PGLite database (module so its imports resolve correctly). -->
    <script src="app.js" type="module"></script>
    <script src="assets/alpine.min.js" defer></script>
  </head>
  <body>
    <!-- Shared navbar + settings (inlined at build by the templater). -->
    <template x-src="navbar.html"></template>

    <main
      class="container"
      x-data="{
        budget: null,
        expenses: [],
        loading: true,
        error: '',
        async init() {
          try {
            const id = Number(new URLSearchParams(location.search).get('budgetId'));
            const db = await window.__expenseDBReady;
            await db.ready;
            if (!id) { this.error = 'No budget specified.'; return; }
            this.budget = await db.budgets.get(id);
            if (!this.budget) { this.error = 'Budget #' + id + ' was not found.'; return; }
            this.expenses = await db.budgets.expenses(id);
          } catch (e) {
            console.error(e);
            this.error = 'Could not load this budget.';
          } finally {
            this.loading = false;
          }
        },
        formatDate(d) {
          return new Date(d).toISOString().slice(0, 10);
        },
        parseDate(s) {
          const p = String(s).split('-').map(Number);
          return new Date(p[0], p[1] - 1, p[2]);
        },
        fmtTill(s) {
          return this.parseDate(s).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        },
        daysLeftLabel(s) {
          const t = this.parseDate(s); t.setHours(0, 0, 0, 0);
          const now = new Date(); now.setHours(0, 0, 0, 0);
          const n = Math.round((t - now) / 86400000);
          if (n > 1) return n + ' days';
          if (n === 1) return '1 day';
          if (n === 0) return 'today';
          return 'ended';
        },
        fmtNum(n) {
          return Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
        },
        roundRect(ctx, x, y, w, h, r) {
          r = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        },
        drawBar(canvas, b) {
          const ctx = canvas.getContext('2d');
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0, 0, w, h);
          const budget = Number(b.budget), spent = Number(b.spent);
          const ratio = budget > 0 ? Math.min(spent / budget, 1) : 0;
          const over = spent > budget;
          ctx.fillStyle = '#e5e7eb';
          this.roundRect(ctx, 0, 0, w, h, h / 2); ctx.fill();
          if (ratio > 0) {
            ctx.fillStyle = over ? '#ef4444' : '#10b981';
            this.roundRect(ctx, 0, 0, Math.max(ratio * w, h), h, h / 2); ctx.fill();
          }
        }
      }"
    >
      <p x-show="loading" aria-busy="true">Loading…</p>

      <article x-show="error" style="border-left: 4px solid #ef4444">
        <p x-text="error"></p>
        <a href="budget.html">← Back to budgets</a>
      </article>

      <template x-if="!loading && budget && !error">
        <div>
          <h2 x-text="budget.name"></h2>

          <!-- The budget row, exactly as on the budgets page. -->
          <table>
            <thead>
              <tr>
                <th scope="col">Till</th>
                <th scope="col">Budget</th>
                <th scope="col">Left</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">
                  <span x-text="fmtTill(budget.date_till)"></span>
                  <small x-text="'(' + daysLeftLabel(budget.date_till) + ')'"></small>
                </th>
                <td>
                  <div style="display: flex; flex-direction: column; gap: 3px">
                    <small>
                      <strong x-text="budget.name"></strong>
                      <span style="color: var(--pico-muted-color)" x-text="'· ' + (budget.category || budget.supercategory)"></span>
                    </small>
                    <canvas x-init="drawBar($el, budget)" width="220" height="14" style="max-width: 100%"></canvas>
                  </div>
                </td>
                <td x-text="fmtNum(Number(budget.budget) - Number(budget.spent)) + '/' + fmtNum(budget.budget) + ' EUR'"></td>
              </tr>
            </tbody>
          </table>

          <h3>Transactions</h3>
          <p x-show="expenses.length === 0">No transactions for this budget.</p>
          <table x-show="expenses.length > 0">
            <thead>
              <tr>
                <th scope="col">Date</th>
                <th scope="col">Amount</th>
                <th scope="col">Category</th>
                <th scope="col">Supercategory</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="e in expenses" :key="e.id">
                <tr>
                  <th scope="row" x-text="formatDate(e.data)"></th>
                  <td x-text="e.amount + ' ' + e.currency"></td>
                  <td x-text="e.category"></td>
                  <td x-text="e.supercategory"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
    </main>
  </body>
</html>
