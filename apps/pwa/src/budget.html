<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tomsy — Budgets</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tomsy" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/icon-512.png" />
    <!-- pico.css and Alpine.js served locally from assets, not a CDN -->
    <link rel="stylesheet" href="assets/pico.min.css" />
    <!-- Shared readiness-promise script (inlined at build by the templater). -->
    <template x-src="db-ready.js"></template>
    <!-- Local PGLite database (module so its imports resolve correctly). -->
    <script src="app.js" type="module"></script>
    <script src="assets/alpine.min.js" defer></script>
  </head>
  <body>
    <!-- Shared navbar + settings (inlined at build by the templater). -->
    <template x-src="navbar.html"></template>

    <main
      class="container"
      x-data="{
        budgets: [],
        categories: [],
        loading: true,
        message: '',
        db: null,
        archived: false,
        showAdd: false,
        editingId: null,
        saving: false,
        deleting: false,
        addMessage: '',
        form: { name: '', supercategory: '', category: '', budget: '', dateFrom: '', dateTill: '' },
        async init() {
          try {
            this.archived = new URLSearchParams(location.search).get('archived') === 'true';
            this.db = await window.__expenseDBReady;
            await this.db.ready;
            this.categories = await this.db.listCategories();
            await this.reload();
          } catch (e) {
            console.error(e);
            this.message = 'Could not load budgets';
          } finally {
            this.loading = false;
          }
        },
        async reload() {
          this.budgets = await this.db.listBudgets({ archived: this.archived });
        },
        get supercategories() {
          return [...new Set(this.categories.map((c) => c.supercategory))].sort();
        },
        categoriesFor(sc) {
          return this.categories.filter((c) => c.supercategory === sc);
        },
        openAdd() {
          const today = new Date().toISOString().slice(0, 10);
          this.editingId = null;
          this.form = { name: '', supercategory: '', category: '', budget: '', dateFrom: today, dateTill: today };
          this.addMessage = '';
          this.showAdd = true;
        },
        openEdit(b) {
          this.editingId = b.id;
          this.form = {
            name: b.name,
            supercategory: b.supercategory,
            category: b.category || '',
            budget: String(b.budget),
            dateFrom: b.date_from,
            dateTill: b.date_till
          };
          this.addMessage = '';
          this.showAdd = true;
        },
        get amountValue() {
          const s = String(this.form.budget).replace(/\s/g, '');
          const d = Math.max(s.lastIndexOf('.'), s.lastIndexOf(','));
          if (d === -1) return parseFloat(s);
          return parseFloat(s.slice(0, d).replace(/[.,]/g, '') + '.' + s.slice(d + 1).replace(/[.,]/g, ''));
        },
        get addValid() {
          return !!this.form.name && !!this.form.supercategory && this.amountValue > 0
            && !!this.form.dateFrom && !!this.form.dateTill;
        },
        async saveBudget() {
          if (!this.addValid || this.saving) return;
          this.saving = true;
          this.addMessage = '';
          const data = {
            name: this.form.name,
            category: this.form.category || null,
            supercategory: this.form.supercategory,
            budget: this.amountValue,
            dateFrom: this.form.dateFrom,
            dateTill: this.form.dateTill
          };
          try {
            if (this.editingId) await this.db.updateBudget(this.editingId, data);
            else await this.db.insertBudget(data);
            await this.reload();
            this.showAdd = false;
          } catch (e) {
            console.error(e);
            this.addMessage = 'Failed to save: ' + e.message;
          } finally {
            this.saving = false;
          }
        },
        async removeBudget() {
          if (!this.editingId || this.deleting) return;
          this.deleting = true;
          this.addMessage = '';
          try {
            await this.db.deleteBudget(this.editingId);
            await this.reload();
            this.showAdd = false;
          } catch (e) {
            console.error(e);
            this.addMessage = 'Failed to delete: ' + e.message;
          } finally {
            this.deleting = false;
          }
        },
        parseDate(s) {
          const p = String(s).split('-').map(Number);
          return new Date(p[0], p[1] - 1, p[2]);
        },
        fmtTill(s) {
          return this.parseDate(s).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        },
        daysLeftLabel(s) {
          const t = this.parseDate(s); t.setHours(0, 0, 0, 0);
          const now = new Date(); now.setHours(0, 0, 0, 0);
          const n = Math.round((t - now) / 86400000);
          if (n > 1) return n + ' days';
          if (n === 1) return '1 day';
          if (n === 0) return 'today';
          return 'ended';
        },
        fmtNum(n) {
          return Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
        },
        roundRect(ctx, x, y, w, h, r) {
          r = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        },
        drawBar(canvas, b) {
          const ctx = canvas.getContext('2d');
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0, 0, w, h);
          const budget = Number(b.budget), spent = Number(b.spent);
          const ratio = budget > 0 ? Math.min(spent / budget, 1) : 0;
          const over = spent > budget;
          // track (available)
          ctx.fillStyle = '#e5e7eb';
          this.roundRect(ctx, 0, 0, w, h, h / 2); ctx.fill();
          // spent fill
          if (ratio > 0) {
            ctx.fillStyle = over ? '#ef4444' : '#10b981';
            this.roundRect(ctx, 0, 0, Math.max(ratio * w, h), h, h / 2); ctx.fill();
          }
        }
      }"
    >
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem">
        <h2 style="margin: 0">Budgets</h2>
        <button @click="openAdd()" style="width: auto">Add</button>
      </div>

      <p>
        <a href="budget.html" :aria-current="!archived ? 'page' : null">Active</a>
        ·
        <a href="budget.html?archived=true" :aria-current="archived ? 'page' : null">Archived</a>
      </p>

      <p x-show="loading" aria-busy="true">Loading…</p>
      <p x-show="message" x-text="message"></p>
      <p x-show="!loading && !message && budgets.length === 0" x-text="archived ? 'No archived budgets.' : 'No active budgets.'"></p>

      <table x-show="budgets.length > 0">
        <thead>
          <tr>
            <th scope="col">Till</th>
            <th scope="col">Budget</th>
            <th scope="col">Left</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="b in budgets" :key="b.id">
            <tr @click="openEdit(b)" style="cursor: pointer">
              <th scope="row">
                <a :href="'budget-transactions.html?budgetId=' + b.id" @click.stop>
                  <span x-text="fmtTill(b.date_till)"></span>
                  <small x-text="'(' + daysLeftLabel(b.date_till) + ')'"></small>
                </a>
              </th>
              <td>
                <div style="display: flex; flex-direction: column; gap: 3px">
                  <small>
                    <strong x-text="b.name"></strong>
                    <span style="color: var(--pico-muted-color)" x-text="'· ' + (b.category || b.supercategory)"></span>
                  </small>
                  <canvas x-init="drawBar($el, b)" width="220" height="14" style="max-width: 100%"></canvas>
                </div>
              </td>
              <td x-text="fmtNum(Number(b.budget) - Number(b.spent)) + '/' + fmtNum(b.budget) + ' EUR'"></td>
            </tr>
          </template>
        </tbody>
      </table>

      <!-- Add / edit budget modal (Pico) -->
      <dialog :open="showAdd">
        <article>
          <header>
            <button aria-label="Close" rel="prev" @click="if (!saving && !deleting) showAdd = false"></button>
            <p><strong x-text="editingId ? 'Edit budget' : 'New budget'"></strong></p>
          </header>

          <label>
            Name
            <input type="text" x-model="form.name" required />
          </label>

          <label>
            Supercategory
            <select x-model="form.supercategory" @change="form.category = ''" required>
              <option value="" disabled>Select a supercategory</option>
              <template x-for="sc in supercategories" :key="sc">
                <option :value="sc" x-text="sc"></option>
              </template>
            </select>
          </label>

          <label>
            Category (optional)
            <select x-model="form.category">
              <option value="">— whole supercategory —</option>
              <template x-for="c in categoriesFor(form.supercategory)" :key="c.category">
                <option :value="c.category" x-text="c.category"></option>
              </template>
            </select>
          </label>

          <label>
            Budget
            <input
              type="text"
              inputmode="decimal"
              placeholder="0.00"
              x-model="form.budget"
              @input="form.budget = form.budget.replace(/[^0-9.,]/g, '')"
              required
            />
          </label>

          <div style="display: flex; gap: 1rem">
            <label style="flex: 1">
              From
              <input type="date" x-model="form.dateFrom" required />
            </label>
            <label style="flex: 1">
              Till
              <input type="date" x-model="form.dateTill" required />
            </label>
          </div>

          <p x-show="addMessage" x-text="addMessage"></p>

          <footer style="display: flex; gap: 0.5rem; align-items: center">
            <button
              x-show="editingId"
              @click="removeBudget()"
              :disabled="saving || deleting"
              :aria-busy="deleting"
              style="--pico-background-color: #c0392b; --pico-border-color: #c0392b"
              x-text="deleting ? 'Deleting…' : 'Delete'"
            ></button>
            <span style="flex: 1"></span>
            <button class="secondary" @click="showAdd = false" :disabled="saving || deleting">Cancel</button>
            <button
              @click="saveBudget()"
              :disabled="!addValid || saving || deleting"
              :aria-busy="saving"
              x-text="saving ? 'Saving…' : (editingId ? 'Save' : 'Add')"
            ></button>
          </footer>
        </article>
      </dialog>
    </main>
  </body>
</html>
