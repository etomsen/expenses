<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses</title>
    <!-- pico.css and Alpine.js served locally from assets, not a CDN -->
    <link rel="stylesheet" href="assets/pico.min.css" />
    <!-- Mask plugin must load before Alpine core -->
    <script src="assets/alpine-mask.min.js" defer></script>
    <script src="assets/alpine.min.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>Expenses</h1>

      <form
        style="max-width: 400px; margin: 0 auto"
        x-data="{
          api: 'http://localhost:3000',
          form: {
            date: new Date().toISOString().slice(0, 10),
            amount: '',
            currency: 'EUR',
            category: '',
            description: ''
          },
          currencies: ['EUR', 'RUB', 'BYN', 'USD'],
          categories: [],
          saving: false,
          message: '',
          async init() {
            try {
              const res = await fetch(this.api + '/categories');
              this.categories = await res.json();
            } catch (e) {
              this.message = 'Could not load categories';
            }
          },
          get amountValue() {
            return parseFloat(String(this.form.amount).replace(/,/g, ''));
          },
          get isValid() {
            return (
              !!this.form.date &&
              this.amountValue > 0 &&
              !!this.form.currency &&
              !!this.form.category
            );
          },
          async submit() {
            if (!this.isValid || this.saving) return;
            const selected = this.categories.find((c) => c.category === this.form.category);
            const payload = {
              data: new Date(this.form.date).toISOString(),
              amount: this.amountValue,
              currency: this.form.currency,
              desc: this.form.description,
              category: this.form.category,
              supercategory: selected ? selected.supercategory : ''
            };
            this.saving = true;
            this.message = '';
            try {
              const res = await fetch(this.api + '/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error((err.errors || [err.error]).join(', ') || res.statusText);
              }
              const saved = await res.json();
              this.message = 'Saved expense #' + saved.id;
              this.form.amount = '';
              this.form.description = '';
              this.form.category = '';
            } catch (e) {
              this.message = 'Failed to save: ' + e.message;
            } finally {
              this.saving = false;
            }
          }
        }"
        @submit.prevent="submit"
      >
        <label for="date">Date</label>
        <input id="date" type="date" x-model="form.date" required />

        <div style="display: flex; gap: 1rem; align-items: flex-end">
          <div style="flex: 1">
            <label for="amount">Amount</label>
            <input
              id="amount"
              type="text"
              inputmode="decimal"
              placeholder="0.00"
              style="width: 100%"
              x-model="form.amount"
              x-mask:dynamic="$money($input)"
              required
            />
          </div>
          <div>
            <select id="currency" x-model="form.currency" required>
              <template x-for="c in currencies" :key="c">
                <option :value="c" x-text="c"></option>
              </template>
            </select>
          </div>
        </div>

        <label for="category">Category</label>
        <select id="category" x-model="form.category" required>
          <option value="" disabled>Select a category</option>
          <template x-for="c in categories" :key="c.category">
            <option :value="c.category" x-text="c.category + ' (' + c.supercategory + ')'"></option>
          </template>
        </select>

        <label for="description">Description</label>
        <input id="description" type="text" x-model="form.description" />

        <button type="submit" :disabled="!isValid || saving" x-text="saving ? 'Saving…' : 'Add expense'"></button>

        <p x-show="message" x-text="message"></p>
      </form>
    </main>
  </body>
</html>
